name: 🛡️ CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  ci:
    uses: ROKO108/.github/workflows/universal-ci.yml@main
    # ── Opciones personalizables por repo ──────────────────
    with:
      validate_all: false        # true = analiza todo, false = solo cambios
      # disable_linters: "SPELL" # descomenta para desactivar linters concretos
    secrets: inherit             # pasa el GITHUB_TOKEN automáticamente
